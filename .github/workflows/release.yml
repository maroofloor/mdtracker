name: Build & Release

# v태그 푸시 시 자동 빌드/릴리스: git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:   # 수동 실행 (테스트용)

permissions:
  contents: write      # GitHub Release 생성 권한

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      # ── 1. 소스 체크아웃 ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 설치 ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. 의존성 설치 ──────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 4. 버전 추출 ────────────────────────────────────────────────────────
      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"          # v1.0.0-beta.1
          $ver = $tag.TrimStart('v')               # 1.0.0-beta.1
          $numver = ($ver -split '-')[0]           # 1.0.0  (프리릴리스 접미사 제거)
          echo "TAG=$tag"       >> $env:GITHUB_OUTPUT
          echo "VERSION=$ver"   >> $env:GITHUB_OUTPUT
          echo "NUMVER=$numver" >> $env:GITHUB_OUTPUT

      # ── 5. version_info.txt 및 __init__.py 버전 동기화 ──────────────────────
      - name: Patch version strings
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $numver = "${{ steps.version.outputs.NUMVER }}"
          $parts = $numver -split '\.'   # 정수 튜플은 숫자 버전만 사용
          $tuple = "($($parts[0]), $($parts[1]), $($parts[2]), 0)"

          # version_info.txt
          (Get-Content version_info.txt) `
            -replace "filevers=\(.*?\)",  "filevers=$tuple" `
            -replace "prodvers=\(.*?\)",  "prodvers=$tuple" `
            -replace "'FileVersion',\s+'[^']*'",  "'FileVersion',      '$ver'" `
            -replace "'ProductVersion',\s+'[^']*'","'ProductVersion',   '$ver'" |
            Set-Content version_info.txt

          # mdtracker/__init__.py
          (Get-Content mdtracker/__init__.py) `
            -replace '__version__ = "[^"]*"', "__version__ = `"$ver`"" |
            Set-Content mdtracker/__init__.py

      # ── 6. Tesseract 다운로드 & 번들 ────────────────────────────────────────
      - name: Download & bundle Tesseract
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # UB Mannheim Tesseract (현재 최신 안정 버전으로 고정)
          $ver = "5.4.0.20240606"
          $url = "https://github.com/UB-Mannheim/tesseract/releases/download/v$ver/tesseract-ocr-w64-setup-$ver.exe"
          $installer = "$env:TEMP\tesseract_setup.exe"

          Write-Host "Downloading Tesseract $ver ..."
          Invoke-WebRequest -Uri $url -OutFile $installer

          # 무인 설치 (/D 는 반드시 마지막, 따옴표 없이)
          $tessRoot = "C:\Program Files\Tesseract-OCR"
          Start-Process $installer -ArgumentList '/S', "/D=$tessRoot" -Wait
          if (-not (Test-Path "$tessRoot\tesseract.exe")) { throw "Tesseract 설치 실패" }

          # 한국어 학습데이터 추가 (인스톨러 기본 구성에 없을 수 있어 직접 내려받음)
          $korUrl = "https://github.com/tesseract-ocr/tessdata/raw/main/kor.traineddata"
          Invoke-WebRequest -Uri $korUrl -OutFile "$tessRoot\tessdata\kor.traineddata"

          # 번들 폴더로 복사
          New-Item -ItemType Directory -Force -Path tesseract | Out-Null
          Copy-Item "$tessRoot\*" tesseract -Recurse -Force

          Write-Host "Bundled traineddata:"
          Get-ChildItem tesseract\tessdata\*.traineddata | Select-Object Name

      # ── 7. PyInstaller 빌드 ─────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller MDTracker.spec --noconfirm

      # ── 8. ocr_config.json 기본값 패치 ──────────────────────────────────────
      #    번들된 Tesseract 상대 경로를 기본값으로 지정
      - name: Patch ocr_config defaults
        shell: pwsh
        run: |
          $cfg = Get-Content ocr_config.example.json | ConvertFrom-Json
          $cfg.tesseract_cmd = "tesseract\tesseract.exe"   # 앱 폴더 상대 경로
          $cfg | ConvertTo-Json -Depth 10 | Set-Content dist\MDTracker\ocr_config.example.json

      # ── 9. Inno Setup 인스톨러 빌드 ─────────────────────────────────────────
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6는 GitHub Actions windows-latest에 기본 포함
          $iscc   = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver    = "${{ steps.version.outputs.VERSION }}"
          $numver = "${{ steps.version.outputs.NUMVER }}"

          # AppVersion = 전체 버전(파일명·표시용), VersionInfo* = 숫자만(Inno 요구)
          (Get-Content installer\MDTracker_Setup.iss) `
            -replace '#define AppVersion\s+"[^"]*"', "#define AppVersion   `"$ver`"" `
            -replace 'VersionInfoVersion=[^\r\n]*', "VersionInfoVersion=$numver" `
            -replace 'VersionInfoProductVersion=[^\r\n]*', "VersionInfoProductVersion=$numver" |
            Set-Content installer\MDTracker_Setup.iss

          & $iscc installer\MDTracker_Setup.iss
          ls installer\Output\

      # ── 10. GitHub Release 생성 & 업로드 ────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "MDTracker ${{ steps.version.outputs.TAG }}"
          body: |
            ## 변경 사항
            <!-- 릴리스 노트를 여기에 작성 -->

            ## 설치 방법
            1. 아래 `MDTracker_Setup_v*.exe` 다운로드
            2. 실행 → 안내에 따라 설치
            3. Python / Tesseract 별도 설치 불필요

            ## 시스템 요구사항
            - Windows 10/11 (64bit)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.TAG, '-') }}
          files: |
            installer/Output/MDTracker_Setup_v*.exe
